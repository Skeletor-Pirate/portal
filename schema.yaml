components:
  schemas:
    Attendance:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        student_name:
          type: string
          readOnly: true
        student_enrollment_no:
          type: string
          readOnly: true
        date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StatusEnum'
        remarks:
          type: string
          nullable: true
          maxLength: 255
        school:
          type: string
          format: uuid
          readOnly: true
        student:
          type: string
          format: uuid
        academic_year:
          type: string
          format: uuid
        class_level:
          type: string
          format: uuid
        section:
          type: string
          format: uuid
      required:
      - academic_year
      - class_level
      - date
      - id
      - school
      - section
      - student
      - student_enrollment_no
      - student_name
    AttendanceRecordItemRequest:
      type: object
      properties:
        student_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/StatusEnum'
        remarks:
          type: string
          maxLength: 255
      required:
      - status
      - student_id
    AttendanceRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StatusEnum'
        remarks:
          type: string
          nullable: true
          maxLength: 255
        student:
          type: string
          format: uuid
        academic_year:
          type: string
          format: uuid
        class_level:
          type: string
          format: uuid
        section:
          type: string
          format: uuid
      required:
      - academic_year
      - class_level
      - date
      - section
      - student
    BulkAttendanceRequest:
      type: object
      properties:
        date:
          type: string
          format: date
        academic_year_id:
          type: string
          format: uuid
        class_level_id:
          type: string
          format: uuid
        section_id:
          type: string
          format: uuid
        records:
          type: array
          items:
            $ref: '#/components/schemas/AttendanceRecordItemRequest'
      required:
      - academic_year_id
      - class_level_id
      - date
      - records
      - section_id
    BulkGradeSubmitRequest:
      type: object
      description: |-
        Validates the payload for submitting an entire column of grades.
        Enforces strict Teacher-Subject-Section RBAC logic.
      properties:
        exam_id:
          type: string
          format: uuid
        subject_id:
          type: string
          format: uuid
        section_id:
          type: string
          format: uuid
        records:
          type: array
          items:
            $ref: '#/components/schemas/GradeRecordItemRequest'
      required:
      - exam_id
      - records
      - section_id
      - subject_id
    BulkPromotionRequest:
      type: object
      description: Validates the payload for bulk promoting students to a new academic
        year.
      properties:
        student_ids:
          type: array
          items:
            type: string
            format: uuid
          description: List of StudentProfile UUIDs to promote.
        target_academic_year_id:
          type: string
          format: uuid
        target_class_level_id:
          type: string
          format: uuid
        target_section_id:
          type: string
          format: uuid
      required:
      - student_ids
      - target_academic_year_id
      - target_class_level_id
      - target_section_id
    Exam:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        academic_year_name:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 100
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_published:
          type: boolean
          description: Can parents/students see these results?
        school:
          type: string
          format: uuid
          readOnly: true
        academic_year:
          type: string
          format: uuid
      required:
      - academic_year
      - academic_year_name
      - end_date
      - id
      - name
      - school
      - start_date
    ExamRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        is_published:
          type: boolean
          description: Can parents/students see these results?
        academic_year:
          type: string
          format: uuid
      required:
      - academic_year
      - end_date
      - name
      - start_date
    GradeRecordItemRequest:
      type: object
      properties:
        student_id:
          type: string
          format: uuid
        marks_obtained:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
        max_marks:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          default: '100.00'
        remarks:
          type: string
          maxLength: 255
      required:
      - marks_obtained
      - student_id
    PaginatedAttendanceList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
